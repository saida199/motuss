<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MOTUS — Wall of Fame</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="bg-particles" id="bgParticles"></div>

    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-m">M</span>
                <span class="logo-o">O</span>
                <span class="logo-t">T</span>
                <span class="logo-u">U</span>
                <span class="logo-s">S</span>
            </div>
            <nav class="nav-links">
                <a href="motus.html" class="nav-link">🎮 Jouer</a>
                <a href="score.html" class="nav-link active">🏆 Scores</a>
            </nav>
        </div>
    </header>

    <main class="score-container">
        <div class="score-header">
            <h1 class="score-title">🏆 Wall of Fame</h1>
            <p class="score-subtitle">Les meilleurs joueurs Motus</p>
        </div>

        <div class="score-table-wrapper">
            <table class="score-table" id="scoreTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Joueur</th>
                        <th>Mot trouvé</th>
                        <th>Tentatives</th>
                        <th>Score</th>
                    </tr>
                </thead>
                <tbody id="scoreBody">
                    <!-- Rempli par JS -->
                </tbody>
            </table>
            <div class="no-scores hidden" id="noScores">
                <p>😴 Aucun score enregistré pour l'instant.</p>
                <a href="motus.html" class="btn-modal-primary" style="display:inline-block;margin-top:1rem;">Jouer maintenant !</a>
            </div>
        </div>

        <div style="text-align:center;margin-top:2rem;">
            <button class="btn-restart" onclick="Scores.clearAll()" style="font-size:0.85rem;padding:0.6rem 1.4rem;">🗑️ Effacer les scores</button>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // Affichage des scores sur cette page
        document.addEventListener('DOMContentLoaded', () => {
            Scores.display();
            createParticles();
        });
    </script>
</body>
</html>
